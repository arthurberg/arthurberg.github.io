project:
  type: website
  output-dir: _site

website:
  title: "Arthur Berg, Ph.D."
  description: "Biostatistician, Penn State College of Medicine"
  site-url: https://arthurberg.com
  page-navigation: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: cv.qmd
        text: CV
      - href: publications.qmd
        text: Publications
      - href: contact.qmd
        text: Contact
    right:
      - icon: github
        href: https://github.com/arthurberg
        aria-label: GitHub
      - icon: envelope
        href: mailto:berg@psu.edu
        aria-label: Email
format:
  html:
    theme:
      light: litera
      dark: darkly
    css: styles.css
    toc: true
    link-external-newwindow: true
    anchor-sections: true
    smooth-scroll: true
    include-in-header:
      text: |
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/all.css">
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.5.1/css/brands.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    grid:
      sidebar-width: 250px
      body-width: 2000px
      margin-width: 150px
      gutter-width: 1.5rem
