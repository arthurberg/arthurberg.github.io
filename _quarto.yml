website:
  title: "Arthur Berg, Ph.D."
  description: "Professor of Biostatistics, Penn State College of Medicine. Research in Bayesian methods, clinical trials, statistical genetics, and interdisciplinary data science."
  site-url: https://arthurberg.com
  favicon: favicon.svg
  page-navigation: true
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: cv.qmd
        text: CV
      - href: research.qmd
        text: Research
      - href: bcc.qmd
        text: BCC
      - href: services.qmd
        text: Services
      - href: music.qmd
        text: Music
      - href: contact.qmd
